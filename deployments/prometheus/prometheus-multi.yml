global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'gateway'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['gateway-1:9090']
        labels:
          instance: 'gateway-1'
      - targets: ['gateway-2:9090']
        labels:
          instance: 'gateway-2'

  - job_name: 'envoy-lb'
    metrics_path: '/stats/prometheus'
    static_configs:
      - targets: ['envoy-lb:9901']

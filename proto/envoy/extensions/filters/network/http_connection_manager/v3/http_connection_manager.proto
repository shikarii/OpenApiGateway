syntax = "proto3";

package envoy.extensions.filters.network.http_connection_manager.v3;

import "google/protobuf/any.proto";
import "envoy/config/core/v3/base.proto";

message Rds {
  string route_config_name = 1;
  string config_source = 2;
}

message HttpFilter {
  string name = 1;
  google.protobuf.Any typed_config = 2;
}

message HttpConnectionManager {
  string stat_prefix = 1;
  bool generate_request_id = 2;
  envoy.config.core.v3.HttpProtocolOptions common_http_protocol_options = 3;
  Rds rds = 4;
  repeated HttpFilter http_filters = 5;
}

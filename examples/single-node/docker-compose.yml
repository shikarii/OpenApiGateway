services:
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gateway

  echo-backend:
    image: ealen/echo-server:latest
    container_name: gateway-backend
    environment:
      PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gateway

  fake-jwks:
    image: nginx:alpine
    container_name: gateway-jwks
    ports:
      - "7001:80"
    volumes:
      - ./jwks/jwks.json:/usr/share/nginx/html/.well-known/jwks.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/.well-known/jwks.json"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gateway

  gateway-manager:
    build:
      context: ../..
      dockerfile: ./services/gateway-manager/Dockerfile
    container_name: gateway-manager
    ports:
      - "9090:9090"
    volumes:
      - ../configs/gateway-single-node.yaml:/app/gateway.yaml:ro
      - envoy_config:/app/generated
    environment:
      GATEWAY_CONFIG: /app/gateway.yaml
      ENVOY_CONFIG_PATH: /app/generated/envoy.yaml
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      echo-backend:
        condition: service_healthy
      fake-jwks:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gateway

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: gateway-envoy
    ports:
      - "80:8080"
    volumes:
      - envoy_config:/etc/envoy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Envoy config..."
        while [ ! -f /etc/envoy/envoy.yaml ]; do sleep 1; done
        echo "Config found, starting Envoy"
        /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    depends_on:
      gateway-manager:
        condition: service_healthy
    networks:
      - gateway

  prometheus:
    image: prom/prometheus:latest
    container_name: gateway-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - gateway

volumes:
  redis_data:
  prometheus_data:
  envoy_config:

networks:
  gateway:
    driver: bridge
